version: 2

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck      # Checks for unchecked errors
    - staticcheck   # The "Swiss Army Knife" (includes gosimple, unused, etc.)
    - revive        # Modern replacement for golint
    - misspell      # Finds typos in comments/strings
    - govet         # Reports suspicious constructs (e.g. Printf calls)
    - ineffassign   # Detects ineffectual assignments (like unused variables)

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0